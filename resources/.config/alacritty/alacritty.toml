[scrolling]
history = 100000
multiplier = 5
# ---------- Neon Cyberpunk Theme ----------
[colors.primary]
background = "#0a0f14"   # deep cyber void
foreground = "#d2f8ff"   # icy neon

[colors.cursor]
text = "#0a0f14"
cursor = "#00ff9c"       # neon green cursor

[colors.vi_mode_cursor]
text = "#0a0f14"
cursor = "#00e5ff"

[colors.search.matches]
foreground = "#0a0f14"
background = "#faff00"

[colors.search.focused_match]
foreground = "#0a0f14"
background = "#ff00e6"

[colors.selection]
text       = "#0a0f14"
background = "#00e5ff"

[colors.normal]
black   = "#121821"
red     = "#ff3b3b"
green   = "#00ff9c"
yellow  = "#faff00"
blue    = "#00a3ff"
magenta = "#ff00e6"
cyan    = "#00e5ff"
white   = "#d2f8ff"

[colors.bright]
black   = "#27313f"
red     = "#ff5c57"
green   = "#00ffa9"
yellow  = "#ffff66"
blue    = "#33b7ff"
magenta = "#ff33f0"
cyan    = "#33f1ff"
white   = "#ffffff"

# Optional: subtle dim colors for inactive panes
[colors.dim]
black   = "#0f141b"
red     = "#c94242"
green   = "#28d89e"
yellow  = "#d6d65e"
blue    = "#2a93d8"
magenta = "#d52fd2"
cyan    = "#28cfe0"
white   = "#bfe6ee"

# -------- Appearance / vibe tuning --------
[window]
padding.x = 10
padding.y = 12
dynamic_padding = true
opacity = 0.70     # smoky glass; raise to 1.0 if you don’t like transparency
blur = true        # works on macOS Wayland/Compositors that support it

[font]
normal.family = "JetBrainsMono Nerd Font Mono"
bold.family   = "JetBrainsMono Nerd Font Mono"
italic.family = "JetBrainsMono Nerd Font Mono"
size = 14

[terminal]
osc52 = "OnlyCopy" # cleaner clipboard behavior for copies

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.2

[bell]
animation = "EaseOutExpo"
duration = 0
color = "#ff00e6"  # used if you enable duration > 0

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[mouse]
hide_when_typing = true

# Make bold text pop like arc neon
[colors]
draw_bold_text_with_bright_colors = true
